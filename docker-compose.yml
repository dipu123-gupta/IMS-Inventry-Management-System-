version: '3.8'

services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ims
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
    depends_on:
      - mongo
    networks:
      - ims-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ims-data:/data/db
    networks:
      - ims-network

networks:
  ims-network:
    driver: bridge

volumes:
  ims-data:
